<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>COO Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      background: #06080f;
      color: #e2e8f0;
      font-family: Arial;
      padding: 20px;
    }
    .card {
      background: #0c1120;
      border: 1px solid #1a2540;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    .kpi {
      font-size: 30px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>📊 COO Dashboard</h1>

<div id="error" style="color:red;display:none;">Error loading data</div>

<div class="card">
  <h3>Sessions</h3>
  <div id="sessions" class="kpi">Loading...</div>
</div>

<div class="card">
  <h3>Revenue</h3>
  <div id="revenue" class="kpi">Loading...</div>
</div>

<div class="card">
  <h3>Avg Revenue / Session</h3>
  <div id="rps" class="kpi">Loading...</div>
</div>

<div class="card">
  <canvas id="chart"></canvas>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbx4naJ4pNxaNi6h4M3uNzK0CpmqIeOler9UQLNqhDYlSN3sJNb7MscuzDnRvfGWs84lag/exec";

let chart;

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    if (!data || data.length === 0) throw "No data";

    const latest = data[data.length - 1];

    const sessions = Number(latest["Total Sessions"]) || 0;
    const revenue = Number(latest.Revenue) || 0;
    const rps = sessions ? Math.round(revenue / sessions) : 0;

    document.getElementById("sessions").innerText = sessions;
    document.getElementById("revenue").innerText = "₹ " + revenue.toLocaleString();
    document.getElementById("rps").innerText = "₹ " + rps.toLocaleString();

    const labels = data.map(d => new Date(d.Date).toLocaleDateString());
    const sessionArr = data.map(d => Number(d["Total Sessions"]) || 0);
    const revenueArr = data.map(d => Number(d.Revenue) || 0);

    if (chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [
          {
            label: "Sessions",
            data: sessionArr,
            borderWidth: 2
          },
          {
            label: "Revenue",
            data: revenueArr,
            borderWidth: 2
          }
        ]
      }
    });

  } catch (err) {
    console.log(err);
    document.getElementById("error").style.display = "block";
  }
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
