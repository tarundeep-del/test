<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIB Operations Dashboard</title>
  
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f6; color: #333; }
    
    /* Header */
    .header { background: #1a73e8; color: white; padding: 15px 20px; font-size: 24px; font-weight: bold; }
    
    /* Tabs */
    .tab { overflow: hidden; background-color: #e9e9e9; border-bottom: 1px solid #ccc; padding: 0 20px; }
    .tab button { float: left; border: none; outline: none; cursor: pointer; padding: 14px 24px; transition: 0.3s; font-size: 16px; font-weight: bold; color: #555; background-color: inherit; }
    .tab button:hover { background-color: #ddd; }
    .tab button.active { background-color: #fff; border-bottom: 3px solid #1a73e8; color: #1a73e8; }
    
    /* Content Area */
    .tabcontent { padding: 20px; background: white; margin: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow-x: auto; min-height: 400px;}
    .loading { font-style: italic; color: #666; }
    
    /* Table Styling matching your Google Sheet */
    table { border-collapse: collapse; width: 100%; font-size: 13px; white-space: nowrap; }
    th, td { text-align: center; padding: 10px; border: 1px solid #ddd; }
    
    /* First row (Main Headers) - Green like your screenshot */
    tr:nth-child(1) { background-color: #2e7d32; color: white; font-weight: bold; }
    
    /* Second and Third rows (Target / Threshold) - Brown/Orange */
    tr:nth-child(2) { background-color: #00695c; color: white; }
    tr:nth-child(3) { background-color: #8d6e63; color: white; }
    
    /* Fourth row (Column Sub-headers) - Dark Grey */
    tr:nth-child(4) { background-color: #555; color: white; font-weight: bold; }
    
    /* Alternating row colors for data */
    tr:nth-child(even):not(:nth-child(1)):not(:nth-child(2)):not(:nth-child(3)):not(:nth-child(4)) { background-color: #f9f9f9; }
  </style>
</head>
<body>

  <div class="header">SIB Operations Dashboard</div>

  <div class="tab">
    <button class="tablinks active" onclick="loadTab(event, 'CSAT')">CSAT</button>
    <button class="tablinks" onclick="loadTab(event, 'Sales')">Sales</button>
    <button class="tablinks" onclick="loadTab(event, 'Finance')">Finance</button>
    </div>

  <div id="DashboardContent" class="tabcontent">
    <h2 id="tabTitle">CSAT Daily Data Log</h2>
    <div id="tableContainer">
      <p class="loading">Loading data from Google Sheets...</p>
    </div>
  </div>

  <script>
    // =========================================================================
    // ⚠️ PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
    // =========================================================================
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxmzU9B_t0576FQ_EG8nBEZ0MRuX4RYpjPlpCqAG48r1eTEo7OP1PhGAmEvHmvUOnnt/exec';

    // Load CSAT by default when the page opens
    window.onload = function() {
      document.querySelector('.tablinks.active').click();
    };

    async function loadTab(evt, tabName) {
      // 1. Update UI (Active Tab highlighting)
      let tablinks = document.getElementsByClassName("tablinks");
      for (let i = 0; i < tablinks.length; i++) {
        tablinks[i].className = tablinks[i].className.replace(" active", "");
      }
      evt.currentTarget.className += " active";
      
      // 2. Update Title and set loading state
      document.getElementById('tabTitle').innerText = tabName + " Data";
      const container = document.getElementById('tableContainer');
      container.innerHTML = '<p class="loading">Loading data securely from Google Sheets...</p>';

      if (WEB_APP_URL === 'YOUR_WEB_APP_URL_HERE') {
        container.innerHTML = `<p style="color:red;">Please replace 'YOUR_WEB_APP_URL_HERE' in the HTML code with your actual Apps Script Web App URL.</p>`;
        return;
      }

      // 3. Fetch data from the Web App API
      try {
        // We append "?tabName=XYZ" so the Apps Script knows which sheet to grab
        const response = await fetch(`${WEB_APP_URL}?tabName=${tabName}`);
        const result = await response.json();

        if (result.error) {
          container.innerHTML = `<p style="color:red;">Error: ${result.error}</p>`;
        } else {
          renderTable(result.data);
        }
      } catch (error) {
        container.innerHTML = `<p style="color:red;">Failed to connect to Google Sheets API. Error: ${error}</p>`;
      }
    }

    // Function to generate HTML table from the JSON array
    function renderTable(dataArray) {
      if (!dataArray || dataArray.length === 0) {
        document.getElementById('tableContainer').innerHTML = "<p>No data found in this sheet.</p>";
        return;
      }

      let html = "<table>";
      dataArray.forEach((row, rowIndex) => {
        html += "<tr>";
        row.forEach(cell => {
          // If it's one of the first 4 rows (your complex headers), use <th>
          if (rowIndex < 4) {
            html += `<th>${cell}</th>`;
          } else {
            // Standard data cell
            html += `<td>${cell}</td>`;
          }
        });
        html += "</tr>";
      });
      html += "</table>";

      document.getElementById('tableContainer').innerHTML = html;
    }
  </script>

</body>
</html>
